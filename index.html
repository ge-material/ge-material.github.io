<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geistige Erziehung: Material für die Arbeit mit (Klein-)Kindern</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Geistige Erziehung: Material für die Arbeit mit (Klein-)Kindern</h1>
    </header>

    <div class="layout">
        <nav class="sidebar">
            <h3>Themen / Tugenden</h3>
            <div id="theme-cloud" class="tag-cloud"></div>

            <h3>Kategorien / Tags</h3>
            <div id="tag-cloud" class="tag-cloud"></div>
        </nav>

        <main>
            <div id="active-filter-area">
                <span id="filter-status-text">Alle Materialien werden angezeigt</span>
                <div id="active-chips"></div>
            </div>

            <div id="content-grid">Material wird geladen...</div>
        </main>
    </div>
    <script>
		// Erzeugt einen Link mit der aktuellen Uhrzeit als Version, z.B. script.js?t=162000...
		var script = document.createElement('script');
		script.src = 'script.js?v=' + Date.now();
		document.head.appendChild(script);
	</script>
</body>
</html>
